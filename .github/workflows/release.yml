name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional tag name when running manually
        required: false
        type: string
      draft:
        description: Create a draft release
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/remote-reader
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Prepare Android artifact
        run: |
          mkdir -p ../../dist
          cp app/build/outputs/apk/debug/remote-reader-2.4-debug.apk ../../dist/MyNumber-Reader-android-debug.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: dist/MyNumber-Reader-android-debug.apk

  build-macos:
    name: Build macOS Assets
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install macOS build dependencies
        run: brew install automake help2man libtool

      - name: Build staged vpcd payload
        run: bash ./scripts/build_vpcd_macos.sh

      - name: Build macOS app
        run: bash ./scripts/build_menubar_app_macos.sh

      - name: Build macOS beta pkg
        run: bash ./scripts/build_app_pkg_macos.sh

      - name: Package macOS artifacts
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "build/mac-app/MyNumber Bridge.app" "dist/MyNumber-Bridge-macos-app.zip"
          cp "build/pkg/MyNumber-Bridge-macos-beta.pkg" "dist/MyNumber-Bridge-macos-beta.pkg"
          tar -C build/vsmartcard-stage -czf "dist/MyNumber-Bridge-vpcd-stage-macos.tar.gz" .

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-macos
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: release-android
          path: dist

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: dist

      - name: Resolve tag name
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
            if [ -z "$TAG" ]; then
              TAG="manual-${GITHUB_RUN_NUMBER}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true' }}
          files: dist/*
          body: |
            MyNumber Bridge の beta 配布物です。

            含まれるもの:
            - Android debug APK
            - macOS beta pkg
            - macOS app bundle zip
            - 手動導入用の staged vpcd payload
