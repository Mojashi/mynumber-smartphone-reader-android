name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/remote-reader
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/remote-reader/app/build/outputs/apk/debug/remote-reader-2.4-debug.apk

  macos-app:
    name: macOS App Bundle
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS app
        run: bash ./scripts/build_menubar_app_macos.sh

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-bundle
          path: build/mac-app/MyNumber Bridge.app
